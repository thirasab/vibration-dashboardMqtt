<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Real-time 3-Axis Vibration Monitor</title>
  
  <link rel="stylesheet" href="https://unpkg.com/uplot/dist/uPlot.min.css">
  <script src="https://unpkg.com/uplot/dist/uPlot.iife.min.js"></script>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

  <style>
    :root {
      --bg-main: #0b0f19; --bg-card: #151f32; --bg-graph: #0a0e17;
      --border-color: #24344d; --text-main: #f8fafc; --text-muted: #94a3b8;
      --primary: #3b82f6; --success: #10b981; --warn: #f59e0b; --danger: #f43f5e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg-main); color: var(--text-main); font-family: sans-serif; padding: 15px; }
    h2 { color: #60a5fa; font-size: 1.6rem; margin-bottom: 6px; }
    
    .status { display: inline-flex; align-items: center; gap: 6px; font-size: 0.85rem; margin-bottom: 20px; background: #1e293b; padding: 6px 14px; border-radius: 20px; }
    .status.online { color: var(--success); } .status.offline { color: var(--danger); }

    #dashboard { display: grid; grid-template-columns: 1fr; gap: 20px; max-width: 1200px; margin: 0 auto; }
    .node-container { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 16px; }
    .node-title { font-size: 1.25rem; font-weight: 700; color: #e2e8f0; margin-bottom: 10px; }
    
    .node-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
    .stat-card { background: rgba(10, 14, 23, 0.5); padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border-color); }
    .stat-label { font-size: 0.75rem; color: var(--text-muted); }
    .stat-value { font-size: 1.15rem; font-weight: 700; color: var(--primary); }
    
    .graph-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
    .graph-block { background: var(--bg-graph); padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); }
    .graph-block h4 { margin-bottom: 8px; font-size: 0.85rem; font-weight: 600; color: #e2e8f0;}
    .chart-container { width: 100%; height: 180px; } /* ขยายความสูงเผื่อ Legend */

    /* 🟢 ปรับแต่ง uPlot Legend ให้อ่านง่าย */
    .u-legend { color: #f8fafc; font-size: 12px; padding-bottom: 5px; text-align: center; }
    .u-legend .u-series th { font-weight: 600; }
    .u-legend .u-value { color: #e2e8f0; }

    @media (min-width: 768px) { .graph-grid { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>

  <h2>⚡ 3-Axis XYZ Vibration Dashboard</h2>
  <div id="conn-status" class="status">Connecting to MQTT Broker...</div>
  <div id="dashboard">Waiting for 3-Axis sensor data...</div>

  <script>
    const RES = 1000 / 512; 
    let activeNodes = {}; 
    let charts = {}; 
    let isDashboardDirty = false;

    // สร้างแกน X มาตรฐานความยาว 128 จุด
    const waveX = Array.from({length: 128}, (_, i) => i);
    const fftX = Array.from({length: 128}, (_, i) => (i + 4) * RES);
    const emptyArr = Array.from({length: 128}, () => 0); // เอาไว้ถมดำถ้าข้อมูลแกนไหนหายไป

    // ==========================================
    // 🟢 ตั้งค่ากราฟ Waveform (3 เส้น)
    // ==========================================
    function getWaveOptions(width) {
      return {
        width: width, height: 180,
        axes: [ { show: false }, { stroke: "#cbd5e1", grid: { stroke: "#24344d", width: 1 } } ],
        series: [
          {}, 
          { label: "X", stroke: "#f43f5e", width: 1.5, points: { show: false } }, // สีแดง
          { label: "Y", stroke: "#10b981", width: 1.5, points: { show: false } }, // สีเขียว
          { label: "Z", stroke: "#3b82f6", width: 1.5, points: { show: false } }  // สีน้ำเงิน
        ],
        cursor: { show: false }
      };
    }

    // ==========================================
    // 🟢 ตั้งค่ากราฟ FFT (3 เส้น)
    // ==========================================
    function getFftOptions(width) {
      return {
        width: width, height: 180,
        axes: [
          { stroke: "#cbd5e1", grid: { show: false }, values: (u, vals) => vals.map(v => v.toFixed(0) + "Hz") },
          { stroke: "#cbd5e1", grid: { stroke: "#24344d", width: 1 } }
        ],
        series: [
          {}, 
          { label: "X", stroke: "#f43f5e", width: 1.5, points: { show: false } }, 
          { label: "Y", stroke: "#10b981", width: 1.5, points: { show: false } }, 
          { label: "Z", stroke: "#3b82f6", width: 1.5, points: { show: false } }
        ],
        cursor: { show: false }
      };
    }

    function updateDashboardOptimized() {
      let container = document.getElementById('dashboard');
      if (container.innerHTML.includes("Waiting")) container.innerHTML = ''; 
      
      Object.keys(activeNodes).forEach((id) => {
        let n = activeNodes[id];
        let cardId = `node-card-${id}`;
        let cardEl = document.getElementById(cardId);
        
        if (!cardEl) {
          let html = `
          <div class="node-container" id="${cardId}">
            <div class="node-title">🏭 Node: ${n.id}</div>
            <div class="node-stats">
              <div class="stat-card">
                <div class="stat-label">Max RMS</div>
                <div class="stat-value" id="val-rms-${id}">--</div>
              </div>
              <div class="stat-card">
                <div class="stat-label">Max Peak</div>
                <div class="stat-value" style="color:#60a5fa" id="val-peak-${id}">--</div>
              </div>
              <div class="stat-card">
                <div class="stat-label">Dom Freq</div>
                <div class="stat-value warn" id="val-freq-${id}">--</div>
              </div>
              <div class="stat-card">
                <div class="stat-label">Temperature</div>
                <div class="stat-value" style="color:#10b981" id="val-temp-${id}">--</div>
              </div>
            </div>

            <div class="graph-grid">
              <div class="graph-block">
                <h4>🟢 Time Waveform (X, Y, Z)</h4>
                <div class="chart-container" id="chart-wave-${id}"></div>
              </div>
              <div class="graph-block">
                <h4>🔵 FFT Spectrum (X, Y, Z)</h4>
                <div class="chart-container" id="chart-fft-${id}"></div>
              </div>
            </div>
          </div>`;
          container.insertAdjacentHTML('beforeend', html);

          let waveContainer = document.getElementById(`chart-wave-${id}`);
          let fftContainer = document.getElementById(`chart-fft-${id}`);
          
          charts[id] = {
            wave: new uPlot(getWaveOptions(waveContainer.clientWidth), [waveX, emptyArr, emptyArr, emptyArr], waveContainer),
            fft: new uPlot(getFftOptions(fftContainer.clientWidth), [fftX, emptyArr, emptyArr, emptyArr], fftContainer)
          };
        }

        document.getElementById(`val-rms-${id}`).innerHTML = `${(n.rms || 0).toFixed(2)} <span style="font-size:0.75rem">mm/s</span>`;
        document.getElementById(`val-peak-${id}`).innerHTML = `${(n.peak || 0).toFixed(2)} <span style="font-size:0.75rem">G</span>`;
        document.getElementById(`val-freq-${id}`).innerHTML = `${(n.freq || 0).toFixed(1)} <span style="font-size:0.75rem">Hz</span>`;
        document.getElementById(`val-temp-${id}`).innerHTML = `${(n.temp || 0).toFixed(1)} <span style="font-size:0.75rem">°C</span>`;

        // 🟢 ดึงข้อมูล 3 แกนลงกราฟ (ถ้าไม่มีแกนไหนส่งมา ให้วาดเป็นเส้น 0 ว่างๆ)
        if (charts[id]) {
          let wx = n.waveX || n.wave || emptyArr;
          let wy = n.waveY || emptyArr;
          let wz = n.waveZ || emptyArr;
          
          let fx = n.fftX || n.fft || emptyArr;
          let fy = n.fftY || emptyArr;
          let fz = n.fftZ || emptyArr;

          charts[id].wave.setData([waveX, wx, wy, wz]);
          charts[id].fft.setData([fftX, fx, fy, fz]);
        }
      });
    }

    window.addEventListener("resize", () => {
      Object.keys(charts).forEach((id) => {
        let w = document.getElementById(`chart-wave-${id}`);
        let f = document.getElementById(`chart-fft-${id}`);
        if (w && f) {
          charts[id].wave.setSize({ width: w.clientWidth, height: 180 });
          charts[id].fft.setSize({ width: f.clientWidth, height: 180 });
        }
      });
    });

    setInterval(() => { if (isDashboardDirty) { updateDashboardOptimized(); isDashboardDirty = false; } }, 200);

    // ==========================================
    // 🟢 MQTT Connection (HiveMQ Cloud)
    // ==========================================
    const MQTT_BROKER = 'wss://4d79d42984154e37aab32ca068370f40.s1.eu.hivemq.cloud:8884/mqtt';
    const MQTT_TOPIC = 'factory/vibration/live';
    const options = { username: 'vibmonitor', password: 'Mcl19508', clientId: 'WebDash_' + Math.random().toString(16).substr(2, 8) };

    const client = mqtt.connect(MQTT_BROKER, options);

    client.on('connect', function () {
      let statusDiv = document.getElementById('conn-status');
      statusDiv.innerText = "🟢 Connected - XYZ Multi-Axis Mode";
      statusDiv.className = "status online";
      client.subscribe(MQTT_TOPIC);
    });

    client.on('message', function (topic, message) {
      try {
        let payload = JSON.parse(message.toString());
        activeNodes[payload.id] = payload; 
        isDashboardDirty = true; 
      } catch (e) {}
    });

    client.on('offline', function () {
      let statusDiv = document.getElementById('conn-status');
      statusDiv.innerText = "🔴 Offline - Broker Connection Lost";
      statusDiv.className = "status offline";
    });
  </script>
</body>
</html>
