<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Real-time 3-Axis Vibration Monitor</title>
  
  <link rel="stylesheet" href="https://unpkg.com/uplot/dist/uPlot.min.css">
  <script src="https://unpkg.com/uplot/dist/uPlot.iife.min.js"></script>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

  <style>
    /* 🟢 ชุดสีใหม่ ทันสมัยสไตล์ Modern Dark Mode */
    :root {
      --bg-main: #090e17; 
      --bg-card: #111827; 
      --bg-graph: #0f172a;
      --border-color: #1e293b; 
      --text-main: #f8fafc; 
      --text-muted: #64748b;
      --primary: #3b82f6; 
      --success: #10b981; 
      --warn: #f59e0b; 
      --danger: #ef4444;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      background: radial-gradient(circle at top, #1e293b 0%, var(--bg-main) 40%);
      color: var(--text-main); 
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
      padding: 16px; 
      min-height: 100vh;
    }

    /* 🟢 ส่วนหัวและป้าย HiveMQ */
    .header-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      margin-bottom: 24px;
      text-align: center;
    }
    @media (min-width: 768px) {
      .header-container { flex-direction: row; justify-content: space-between; text-align: left; }
    }
    h2 { color: #60a5fa; font-size: 1.5rem; font-weight: 700; letter-spacing: 0.5px; }
    .server-badge {
      background: rgba(59, 130, 246, 0.15);
      color: #60a5fa;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      border: 1px solid rgba(59, 130, 246, 0.3);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    /* 🟢 สถานะการเชื่อมต่อ */
    .status { display: inline-flex; align-items: center; gap: 8px; font-size: 0.85rem; padding: 8px 16px; border-radius: 20px; background: var(--bg-card); border: 1px solid var(--border-color); font-weight: 500; box-shadow: var(--shadow-sm); }
    .status.online { color: var(--success); border-color: rgba(16, 185, 129, 0.3); background: rgba(16, 185, 129, 0.05); } 
    .status.offline { color: var(--danger); border-color: rgba(239, 68, 68, 0.3); background: rgba(239, 68, 68, 0.05); }

    /* 🟢 โครงสร้าง Dashboard แบบ Responsive */
    #dashboard { display: flex; flex-direction: column; gap: 24px; max-width: 1200px; margin: 0 auto; }
    .node-container { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 20px; box-shadow: var(--shadow-md); transition: transform 0.2s; }
    .node-title { font-size: 1.2rem; font-weight: 700; color: #f1f5f9; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    
    /* 🟢 การ์ดแสดงค่าสถิติ */
    .node-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
    @media (min-width: 640px) { .node-stats { grid-template-columns: repeat(4, 1fr); } }
    .stat-card { background: rgba(15, 23, 42, 0.6); padding: 12px; border-radius: 12px; border: 1px solid var(--border-color); text-align: center; }
    .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; font-weight: 600; }
    .stat-value { font-size: 1.3rem; font-weight: 700; color: var(--primary); }
    
    /* 🟢 จัดวางกราฟ */
    .graph-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
    @media (min-width: 800px) { .graph-grid { grid-template-columns: 1fr 1fr; } }
    .graph-block { background: var(--bg-graph); padding: 16px; border-radius: 12px; border: 1px solid var(--border-color); }
    
    /* ปรับปรุงหัวกราฟให้แสดงหน่วยสวยงาม */
    .graph-block h4 { margin-bottom: 12px; font-size: 0.95rem; font-weight: 600; color: #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
    .graph-unit { font-size: 0.75rem; font-weight: 400; color: var(--text-muted); background: rgba(255,255,255,0.05); padding: 2px 8px; border-radius: 4px; }
    
    .chart-container { width: 100%; height: 200px; } 

    /* 🟢 ปรับแต่ง uPlot */
    .u-legend { color: #f8fafc; font-size: 12px; padding-bottom: 8px; text-align: center; }
    .u-legend .u-series th { font-weight: 600; }
    .u-legend .u-value { color: #e2e8f0; }
  </style>
</head>
<body>

  <div class="header-container">
    <h2>⚡ 3-Axis XYZ Vibration Dashboard</h2>
    <div class="server-badge">
      <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/><path d="M10.97 4.97a.235.235 0 0 0-.02.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-1.071-1.05z"/></svg>
      Server: HiveMQ
    </div>
  </div>

  <div style="text-align: center; margin-bottom: 10px;">
    <div id="conn-status" class="status">Connecting to MQTT Broker...</div>
  </div>
  
  <div id="dashboard">
    <div style="text-align: center; color: var(--text-muted); padding: 40px;">
      ⏳ Waiting for 3-Axis sensor data...
    </div>
  </div>

  <script>
    const RES = 1000 / 512; 
    let activeNodes = {}; 
    let charts = {}; 
    let isDashboardDirty = false;

    const waveX = Array.from({length: 128}, (_, i) => i);
    const fftX = Array.from({length: 128}, (_, i) => (i + 4) * RES);
    const emptyArr = Array.from({length: 128}, () => 0); 

    // ยังคงเก็บหน่วยไว้แสดงใน Legend ด้านล่างเมื่อเอาเมาส์ชี้
    const legendValue = (u, v) => v == null ? "--" : v.toFixed(2) + " mm/s";

    function getWaveOptions(width) {
      return {
        width: width, height: 200,
        scales: {
          x: { time: false },
          y: {
            range: (u, dataMin, dataMax) => {
              let min = dataMin < -10.0 ? dataMin * 1.2 : -10.0;
              let max = dataMax > 10.0 ? dataMax * 1.2 : 10.0;
              return [min, max];
            }
          }
        },
        axes: [ 
          { show: false }, 
          { 
            stroke: "#94a3b8", 
            grid: { stroke: "#1e293b", width: 1 },
            // 🟢 นำคำว่า mm/s ออก เพื่อคืนพื้นที่ให้ตัวเลขกลับมาแสดงได้ปกติ
            values: (u, vals) => vals.map(v => v.toFixed(1)) 
          } 
        ],
        series: [
          {}, 
          { label: "X", stroke: "#f43f5e", width: 1.5, points: { show: false }, value: legendValue }, 
          { label: "Y", stroke: "#10b981", width: 1.5, points: { show: false }, value: legendValue }, 
          { label: "Z", stroke: "#3b82f6", width: 1.5, points: { show: false }, value: legendValue }  
        ],
        cursor: { show: false }
      };
    }

    function getFftOptions(width) {
      return {
        width: width, height: 200,
        scales: {
          x: { time: false },
          y: {
            range: (u, dataMin, dataMax) => {
              let max = dataMax > 10.0 ? dataMax * 1.2 : 10.0;
              return [0, max];
            }
          }
        },
        axes: [
          { stroke: "#94a3b8", grid: { show: false }, values: (u, vals) => vals.map(v => v.toFixed(0) + "Hz") },
          { 
            stroke: "#94a3b8", 
            grid: { stroke: "#1e293b", width: 1 },
            // 🟢 นำคำว่า mm/s ออก เพื่อคืนพื้นที่ให้ตัวเลข
            values: (u, vals) => vals.map(v => v.toFixed(1)) 
          }
        ],
        series: [
          {}, 
          { label: "X", stroke: "#f43f5e", width: 1.5, points: { show: false }, value: legendValue }, 
          { label: "Y", stroke: "#10b981", width: 1.5, points: { show: false }, value: legendValue }, 
          { label: "Z", stroke: "#3b82f6", width: 1.5, points: { show: false }, value: legendValue }
        ],
        cursor: { show: false }
      };
    }

    function updateDashboardOptimized() {
      let container = document.getElementById('dashboard');
      if (container.innerHTML.includes("Waiting")) container.innerHTML = ''; 
      
      Object.keys(activeNodes).forEach((id) => {
        let n = activeNodes[id];
        let cardId = `node-card-${id}`;
        let cardEl = document.getElementById(cardId);
        
        if (!cardEl) {
          // 🟢 ย้ายคำว่า (mm/s) มาไว้ที่หัวกราฟแทน 
          let html = `
          <div class="node-container" id="${cardId}">
            <div class="node-title">🏭 Node: ${n.id}</div>
            <div class="node-stats">
              <div class="stat-card">
                <div class="stat-label">Max RMS</div>
                <div class="stat-value" id="val-rms-${id}">--</div>
              </div>
              <div class="stat-card">
                <div class="stat-label">Max Peak</div>
                <div class="stat-value" style="color:#60a5fa" id="val-peak-${id}">--</div>
              </div>
              <div class="stat-card">
                <div class="stat-label">Dom Freq</div>
                <div class="stat-value" style="color:#f59e0b" id="val-freq-${id}">--</div>
              </div>
              <div class="stat-card">
                <div class="stat-label">Temperature</div>
                <div class="stat-value" style="color:#10b981" id="val-temp-${id}">--</div>
              </div>
            </div>

            <div class="graph-grid">
              <div class="graph-block">
                <h4>
                  <span>🟢 Time Waveform (X, Y, Z)</span>
                  <span class="graph-unit">[ mm/s ]</span>
                </h4>
                <div class="chart-container" id="chart-wave-${id}"></div>
              </div>
              <div class="graph-block">
                <h4>
                  <span>🔵 FFT Spectrum (X, Y, Z)</span>
                  <span class="graph-unit">[ mm/s ]</span>
                </h4>
                <div class="chart-container" id="chart-fft-${id}"></div>
              </div>
            </div>
          </div>`;
          container.insertAdjacentHTML('beforeend', html);

          let waveContainer = document.getElementById(`chart-wave-${id}`);
          let fftContainer = document.getElementById(`chart-fft-${id}`);
          
          charts[id] = {
            wave: new uPlot(getWaveOptions(waveContainer.clientWidth), [waveX, emptyArr, emptyArr, emptyArr], waveContainer),
            fft: new uPlot(getFftOptions(fftContainer.clientWidth), [fftX, emptyArr, emptyArr, emptyArr], fftContainer)
          };
        }

        document.getElementById(`val-rms-${id}`).innerHTML = `${(n.rms || 0).toFixed(2)} <span style="font-size:0.75rem; color:#64748b;">mm/s</span>`;
        document.getElementById(`val-peak-${id}`).innerHTML = `${(n.peak || 0).toFixed(2)} <span style="font-size:0.75rem; color:#64748b;">G</span>`;
        document.getElementById(`val-freq-${id}`).innerHTML = `${(n.freq || 0).toFixed(1)} <span style="font-size:0.75rem; color:#64748b;">Hz</span>`;
        document.getElementById(`val-temp-${id}`).innerHTML = `${(n.temp || 0).toFixed(1)} <span style="font-size:0.75rem; color:#64748b;">°C</span>`;

        if (charts[id]) {
          let wx = n.waveX || n.wave || emptyArr;
          let wy = n.waveY || emptyArr;
          let wz = n.waveZ || emptyArr;
          
          let fx = n.fftX || n.fft || emptyArr;
          let fy = n.fftY || emptyArr;
          let fz = n.fftZ || emptyArr;

          charts[id].wave.setData([waveX, wx, wy, wz]);
          charts[id].fft.setData([fftX, fx, fy, fz]);
        }
      });
    }

    window.addEventListener("resize", () => {
      Object.keys(charts).forEach((id) => {
        let w = document.getElementById(`chart-wave-${id}`);
        let f = document.getElementById(`chart-fft-${id}`);
        if (w && f && w.clientWidth > 0) {
          charts[id].wave.setSize({ width: w.clientWidth, height: 200 });
          charts[id].fft.setSize({ width: f.clientWidth, height: 200 });
        }
      });
    });

    setInterval(() => { if (isDashboardDirty) { updateDashboardOptimized(); isDashboardDirty = false; } }, 200);

    const MQTT_BROKER = 'wss://4d79d42984154e37aab32ca068370f40.s1.eu.hivemq.cloud:8884/mqtt';
    const MQTT_TOPIC = 'factory/vibration/live';
    const options = { username: 'vibmonitor', password: 'Mcl19508', clientId: 'WebDash_' + Math.random().toString(16).substr(2, 8) };

    const client = mqtt.connect(MQTT_BROKER, options);

    client.on('connect', function () {
      let statusDiv = document.getElementById('conn-status');
      statusDiv.innerHTML = "🟢 Connected - XYZ Multi-Axis Mode";
      statusDiv.className = "status online";
      client.subscribe(MQTT_TOPIC);
    });

    client.on('message', function (topic, message) {
      try {
        let payload = JSON.parse(message.toString());
        activeNodes[payload.id] = payload; 
        isDashboardDirty = true; 
      } catch (e) {}
    });

    client.on('offline', function () {
      let statusDiv = document.getElementById('conn-status');
      statusDiv.innerHTML = "🔴 Offline - Broker Connection Lost";
      statusDiv.className = "status offline";
    });
  </script>
</body>
</html>
