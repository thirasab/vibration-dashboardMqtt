<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Real-time 3-Axis Vibration Monitor</title>
  <style>
    body { background: #0f172a; color: #f8fafc; font-family: sans-serif; text-align: center; padding: 10px; margin:0; }
    h2 { color: #60a5fa; margin-bottom: 5px; }
    .status { font-size: 0.9rem; color: #94a3b8; margin-bottom: 15px; }
    .status.online { color: #10b981; }
    .node-container { background: #1e293b; border: 1px solid #334155; border-radius: 8px; margin: 15px auto; padding: 15px; max-width: 900px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
    .node-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; padding-bottom: 10px; margin-bottom: 15px; }
    .node-title { font-size: 1.3rem; font-weight: bold; color: #cbd5e1; }
    .node-stats { display: flex; gap: 15px; font-size: 0.95rem; }
    .val { font-weight: bold; color: #60a5fa; font-size: 1.1rem; }
    .val-warn { color: #f43f5e; font-weight: bold; font-size: 1.1rem; }
    
    .graph-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
    .graph-block { background: #111827; padding: 10px; border-radius: 6px; border: 1px solid #334155; }
    canvas { background: #0f172a; width: 100%; border-radius: 4px; display: block; border: 1px solid #1e293b; margin-top: 5px;}
    
    .axis-labels { display: flex; justify-content: center; gap: 20px; margin: 5px 0 15px 0; font-size: 0.85rem; }
    .label-x { color: #10b981; font-weight: bold; }
    .label-y { color: #3b82f6; font-weight: bold; }
    .label-z { color: #f59e0b; font-weight: bold; }
    
    h4 { text-align: left; margin: 0; font-size: 0.9rem; font-weight: 600; }
  </style>
  <!-- โหลดไลบรารี MQTT.js -->
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>
<body>
  <h2>⚡ Real-time 3-Axis Factory Monitor</h2>
  <div id="conn-status" class="status">Connecting to MQTT Broker...</div>
  <div id="dashboard">Waiting for 3-Axis sensor data...</div>

  <script>
    const RES = 1000 / 512; 
    let activeNodes = {}; 

    // 🟢 วาดคลื่น Waveform
    function drawWave(ctx, wave) {
      if(!wave) return;
      ctx.clearRect(0, 0, 800, 150);
      let padL = 40, gW = 800 - padL;
      
      // หาค่าสูงสุดจริงเพื่อทำ Auto-Scale แกน Y
      let maxW = 0.5;
      for(let i=0; i<wave.length; i++) if(Math.abs(wave[i]) > maxW) maxW = Math.abs(wave[i]);

      // วาดเส้นตารางพื้นหลัง (Grid Line)
      ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 1; ctx.beginPath();
      ctx.moveTo(padL, 20); ctx.lineTo(800, 20);
      ctx.moveTo(padL, 75); ctx.lineTo(800, 75);
      ctx.moveTo(padL, 130); ctx.lineTo(800, 130);
      ctx.stroke();

      // สเกลตัวเลขกำกับแกน Y
      ctx.fillStyle = '#64748b'; ctx.font = '11px sans-serif'; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
      ctx.fillText("+" + maxW.toFixed(1), padL - 5, 20);
      ctx.fillText("0.0", padL - 5, 75);
      ctx.fillText("-" + maxW.toFixed(1), padL - 5, 130);

      // วาดเส้นคลื่นสั่นสะเทือน (สีเขียวมรกตครอบคลุมผลรวมเวกเตอร์ลัพธ์)
      ctx.strokeStyle = '#10b981'; ctx.lineWidth = 1.5; ctx.beginPath();
      let stepW = gW / wave.length;
      for(let i=0; i<wave.length; i++) {
        let x = padL + (i * stepW);
        let y = 75 - ((wave[i] / maxW) * 55);
        if(i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }

    // 🟢 วาดแท่งสเปกตรัม FFT (จัดกลุ่มมิติ 3 แกน)
    function drawFFT(ctx, fft) {
      if(!fft) return;
      ctx.clearRect(0, 0, 800, 200);
      let padL = 40, gW = 800 - padL, yOff = 180, gH = 160;
      
      let maxF = 2.0; let actualMaxF = 0; let domIdx = -1;
      for(let i=0; i<fft.length; i++) {
        if(fft[i] > actualMaxF) { actualMaxF = fft[i]; domIdx = i; }
      }
      if(actualMaxF > maxF) maxF = actualMaxF;

      // วาดสเกลตารางแนวนอน
      ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 1; ctx.beginPath();
      for(let j=1; j<=4; j++) {
        let yLine = yOff - (j * (gH/4));
        ctx.moveTo(padL, yLine); ctx.lineTo(800, yLine);
      }
      ctx.stroke();

      // ข้อความกำกับสเกลความแรงสั่นสะเทือน
      ctx.fillStyle = '#64748b'; ctx.font = '11px sans-serif'; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
      for(let j=1; j<=4; j++) ctx.fillText((maxF * (j/4)).toFixed(1), padL - 5, yOff - (j * (gH/4)));
      
      // วาดแท่ง FFT บาร์กราฟ (สีฟ้าสดใส แสดงถึงพลังงานความถี่ลัพธ์)
      let barW = gW / fft.length;
      for(let i=0; i<fft.length; i++) { 
        let h = (fft[i] / maxF) * gH;
        // หากเป็นถังความถี่หลักที่อันตราย (>1.0) ให้เปลี่ยนเป็นสีแดงเตือนภัย
        ctx.fillStyle = (i === domIdx && fft[i] > 1.0) ? '#f43f5e' : '#3b82f6';
        ctx.fillRect(padL + (i * barW), yOff - h, Math.max(barW - 1, 1), h);
      }

      // เส้นฐานกราฟ
      ctx.fillStyle = '#334155'; ctx.fillRect(padL, yOff, gW, 2);
      
      // สเกลความถี่แกน X (หน่วย Hz)
      ctx.fillStyle = '#94a3b8'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      let freqStep = Math.floor(fft.length / 5);
      for(let i=0; i<fft.length; i+=freqStep) {
         let xPos = padL + (i * barW);
         let hz = ((i + 4) * RES).toFixed(0);
         ctx.fillText(hz + " Hz", xPos, yOff + 5);
      }
    }

    // 🟢 อัปเดตโครงสร้างหน้าเว็บ Dashboard 3 แกน
    function updateDashboard() {
      let container = document.getElementById('dashboard');
      let html = '';
      
      Object.keys(activeNodes).sort().forEach((id) => {
        let n = activeNodes[id];
        html += `
          <div class="node-container">
            <div class="node-header">
              <div class="node-title">🏭 Node ID: ${n.id}</div>
              <div class="node-stats">
                <div>RMS (3-Axis): <span class="val">${n.rms.toFixed(2)}</span> mm/s</div>
                <div>Peak Impact: <span class="val">${n.peak.toFixed(2)}</span> G</div>
                <div>Dom Freq: <span class="val-warn">${n.freq.toFixed(1)}</span> Hz</div>
                <div>Temp: <span class="val">${n.temp.toFixed(1)}</span> °C</div>
              </div>
            </div>
            
            <!-- บล็อกระบุสีของแกนสัญญาณ -->
            <!-- 🟢 แบบใหม่ที่ถูกต้องและชัดเจน -->
<div class="axis-labels">
  <span style="color: #cbd5e1; font-weight: bold;">📊 การประมวลผลสัญญาณ:</span>
  <span style="color: #10b981; font-weight: bold;">⚡ 3-Axis Resultant Magnitude (รวมกำลังสั่นสะเทือนทางพิกัด X + Y + Z เรียบร้อยแล้ว)</span>
</div>

            <!-- แบ่งเลย์เอาต์กราฟแบบ 2 คอลัมน์ซ้ายขวาเพื่อให้กระชับสายตา -->
            <div class="graph-grid">
              <div class="graph-block">
                <h4 style="color:#10b981;">〰️ 3-Axis Resultant Waveform (128 Pts)</h4>
                <canvas id="c-wave-${n.id}" width="800" height="150"></canvas>
              </div>
              <div class="graph-block">
                <h4 style="color:#3b82f6;">📊 3-Axis FFT Spectrum Magnitude</h4>
                <canvas id="c-fft-${n.id}" width="800" height="150"></canvas>
              </div>
            </div>
          </div>`;
      });
      
      container.innerHTML = html;

      // สั่งเรนเดอร์ลายเส้นลงแต่ละหน้าต่าง Canvas หลังโครงสร้าง HTML โหลดเสร็จ
      Object.keys(activeNodes).forEach((id) => {
        const ctxW = document.getElementById(`c-wave-${id}`).getContext('2d');
        const ctxF = document.getElementById(`c-fft-${id}`).getContext('2d');
        drawWave(ctxW, activeNodes[id].wave);
        drawFFT(ctxF, activeNodes[id].fft);
      });
    }

    // ==========================================
    // 🟢 เชื่อมต่อระบบเครือข่ายเข้ากับ MQTT Broker
    // ==========================================
    const MQTT_BROKER = 'wss://broker.emqx.io:8084/mqtt';
    const MQTT_TOPIC = 'factory/vibration/live';

    const client = mqtt.connect(MQTT_BROKER);

    client.on('connect', function () {
      let statusDiv = document.getElementById('conn-status');
      statusDiv.innerText = "🟢 Online - Connected to 3-Axis Data Stream";
      statusDiv.className = "status online";
      
      client.subscribe(MQTT_TOPIC, function (err) {
        if (err) console.error("Subscription Broken", err);
      });
    });

    client.on('message', function (topic, message) {
      try {
        let payload = JSON.parse(message.toString());
        activeNodes[payload.id] = payload; // รับและอัปเดตข้อมูลมิติใหม่จากบอร์ดเซนเซอร์
        updateDashboard(); 
      } catch (e) {
        console.error("Payload Data Error", e);
      }
    });

    client.on('offline', function () {
      let statusDiv = document.getElementById('conn-status');
      statusDiv.innerText = "🔴 Offline - System Link Disconnected";
      statusDiv.className = "status";
    });
  </script>
</body>
</html>
